<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resume — Classic Template</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 220px 40px 20px;
            gap: 20px;
        }

        .resume-page,
        .page2 {
            background: white;
            width: 794px;
            min-height: 1123px;
            box-shadow: 0 4px 32px rgba(0, 0, 0, 0.4);
            position: relative;
        }

        .page2 {
            padding: 40px;
        }

        /* TOOLBAR */

        .main-toolbar {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #16213e;
            border-radius: 14px;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 170px;
            z-index: 9999;
        }

        .tb-btn {
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            color: white;
        }

        .tb-back,
        .tb-theme {
            background: rgba(255, 255, 255, 0.08);
        }

        .tb-dl {
            background: #e94560;
        }

        .theme-dots {
            display: none;
            flex-wrap: wrap;
            gap: 8px;
        }

        .theme-dots.show {
            display: flex;
        }

        .tdot {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
        }

        /* HEADER */

        .header {
            background: #1a1a2e;
            padding: 36px 40px;
            display: flex;
            align-items: center;
            gap: 28px;
        }

        .photo-placeholder {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 3px dashed rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            flex-shrink: 0;
        }

        .header-photo {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            display: none;
            border: 3px solid #e94560;
        }

        .resume-name {
            color: white;
            font-size: 34px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            outline: none;
        }

        .resume-title {
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
            letter-spacing: 3px;
            margin-top: 6px;
            text-transform: uppercase;
            outline: none;
        }

        /* BODY */

        .page-body {
            display: grid;
            grid-template-columns: 255px 1fr;
        }

        .left-col {
            background: #f5f5f7;
            padding: 26px 18px;
        }

        .right-col {
            padding: 26px 22px;
        }

        /* SECTION */

        .section {
            margin-bottom: 22px;
            position: relative;
        }

        .sec-title {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #e94560;
            border-bottom: 2px solid #e94560;
            padding-bottom: 5px;
            margin-bottom: 12px;
            outline: none;
        }

        .field,
        .contact-row,
        .exp-item {
            position: relative;
        }

        .fval,
        .c-text,
        .exp-co,
        .exp-role,
        .exp-date,
        .exp-desc {
            outline: none;
        }

        .fval,
        .c-text,
        .exp-desc {
            font-size: 12px;
            color: #555;
            line-height: 1.6;
        }

        .contact-row {
            display: flex;
            gap: 7px;
            margin-bottom: 8px;
        }

        .c-icon {
            color: #e94560;
        }

        .exp-item {
            margin-bottom: 16px;
        }

        .exp-top {
            display: flex;
            justify-content: space-between;
        }

        .exp-co {
            font-size: 13px;
            font-weight: 700;
            color: #1a1a2e;
        }

        .exp-role {
            font-size: 12px;
            color: #e94560;
            margin-top: 2px;
        }

        .exp-date {
            font-size: 11px;
            color: #888;
        }

        .exp-desc {
            margin-top: 5px;
        }

        /* BUTTONS */

        .add-btn {
            padding: 6px 10px;
            border: 1px dashed #ccc;
            background: transparent;
            border-radius: 5px;
            cursor: pointer;
            font-size: 11px;
            margin-top: 10px;
        }

        .del-btn,
        .sec-del {
            position: absolute;
            right: -8px;
            top: 0;
            width: 18px;
            height: 18px;
            border: none;
            background: #e94560;
            color: white;
            border-radius: 4px;
            display: none;
            cursor: pointer;
        }

        .field:hover .del-btn,
        .contact-row:hover .del-btn,
        .exp-item:hover .del-btn,
        .section:hover .sec-del {
            display: block;
        }

        .add-page-btn {
            padding: 10px 24px;
            border-radius: 10px;
            border: 1px dashed rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            cursor: pointer;
        }

        .page2-del {
            position: absolute;
            top: 12px;
            right: 12px;
            background: #e94560;
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
        }

        /* FLOAT TOOLBAR */

        #floatToolbar {
            position: fixed;
            display: none;
            background: #16213e;
            padding: 8px;
            border-radius: 10px;
            gap: 5px;
            z-index: 9999;
        }

        #floatToolbar.show {
            display: flex;
        }

        .ft-btn,
        .ft-select,
        .ft-color {
            border: none;
            border-radius: 5px;
        }

        .ft-btn {
            padding: 5px 8px;
            cursor: pointer;
        }

        .ft-select {
            padding: 5px;
        }

        .ft-color {
            width: 30px;
            height: 30px;
        }

        @media print {

            .main-toolbar,
            .no-print,
            #floatToolbar,
            .add-page-btn {
                display: none !important;
            }

            body {
                background: white;
                padding: 0;
            }

            .resume-page,
            .page2 {
                box-shadow: none;
                page-break-after: always;
            }
        }
    </style>
</head>

<body>

    <!-- FLOAT TOOLBAR -->

    <div id="floatToolbar" class="no-print">

        <button class="ft-btn" onclick="fmt('bold')"><b>B</b></button>

        <button class="ft-btn" onclick="fmt('italic')"><i>I</i></button>

        <button class="ft-btn" onclick="fmt('underline')"><u>U</u></button>

        <select class="ft-select" onchange="setSize(this.value)">
            <option value="">Size</option>
            <option value="12px">12</option>
            <option value="14px">14</option>
            <option value="16px">16</option>
            <option value="18px">18</option>
            <option value="22px">22</option>
            <option value="28px">28</option>
        </select>

        <input class="ft-color" type="color" onchange="setColor(this.value)" />

    </div>

    <!-- MAIN TOOLBAR -->

    <div class="main-toolbar no-print">

        <button class="tb-btn tb-back" onclick="window.location.href='dashboard.html'">
            ← Back
        </button>

        <button class="tb-btn tb-theme" onclick="toggleTheme()">
            🎨 Theme
        </button>

        <div class="theme-dots" id="themeDots">

            <div class="tdot" style="background:#e94560" onclick="changeTheme('#e94560')"></div>

            <div class="tdot" style="background:#2E75B6" onclick="changeTheme('#2E75B6')"></div>

            <div class="tdot" style="background:#27ae60" onclick="changeTheme('#27ae60')"></div>

            <div class="tdot" style="background:#f39c12" onclick="changeTheme('#f39c12')"></div>

        </div>

        <button class="tb-btn tb-dl" onclick="downloadPDF()">
            ⬇ Download PDF
        </button>

    </div>

    <!-- PAGE 1 -->

    <div class="resume-page" id="page1">

        <div class="header" id="resumeHeader">

            <div class="photo-placeholder no-print" id="photoPlaceholder"
                onclick="document.getElementById('photoInput').click()">
                + Photo
            </div>

            <img class="header-photo" id="photoPreview" />

            <input type="file" id="photoInput" accept="image/*" style="display:none"
                onchange="handlePhoto(this)" />

            <div>
                <div class="resume-name" contenteditable="true">
                    YOUR NAME
                </div>

                <div class="resume-title" contenteditable="true">
                    Your Professional Title
                </div>
            </div>

        </div>

        <div class="page-body">

            <!-- LEFT -->

            <div class="left-col">

                <div class="section">

                    <button class="sec-del no-print"
                        onclick="this.closest('.section').remove()">×</button>

                    <div class="sec-title" contenteditable="true">
                        Contact
                    </div>

                    <div id="contactList">

                        <div class="contact-row">

                            <span class="c-icon">📧</span>

                            <span class="c-text" contenteditable="true">
                                your@email.com
                            </span>

                            <button class="del-btn no-print"
                                onclick="this.parentElement.remove()">×</button>

                        </div>

                    </div>

                    <button class="add-btn no-print" onclick="addContact()">
                        + Add
                    </button>

                </div>

                <div class="section">

                    <button class="sec-del no-print"
                        onclick="this.closest('.section').remove()">×</button>

                    <div class="sec-title" contenteditable="true">
                        Skills
                    </div>

                    <div id="skillsList">

                        <div class="field">

                            <div class="fval" contenteditable="true">
                                HTML, CSS, JavaScript
                            </div>

                            <button class="del-btn no-print"
                                onclick="this.parentElement.remove()">×</button>

                        </div>

                    </div>

                    <button class="add-btn no-print" onclick="addSkill()">
                        + Add
                    </button>

                </div>

            </div>

            <!-- RIGHT -->

            <div class="right-col">

                <div class="section">

                    <button class="sec-del no-print"
                        onclick="this.closest('.section').remove()">×</button>

                    <div class="sec-title" contenteditable="true">
                        Profile
                    </div>

                    <div class="fval" contenteditable="true">
                        Write your professional summary here.
                    </div>

                </div>

                <div class="section">

                    <button class="sec-del no-print"
                        onclick="this.closest('.section').remove()">×</button>

                    <div class="sec-title" contenteditable="true">
                        Work Experience
                    </div>

                    <div id="expList">

                        <div class="exp-item">

                            <div class="exp-top">

                                <div>

                                    <div class="exp-co" contenteditable="true">
                                        Company Name
                                    </div>

                                    <div class="exp-role" contenteditable="true">
                                        Your Role
                                    </div>

                                </div>

                                <div class="exp-date" contenteditable="true">
                                    2024 - Present
                                </div>

                            </div>

                            <div class="exp-desc" contenteditable="true">
                                Describe responsibilities here.
                            </div>

                            <button class="del-btn no-print"
                                onclick="this.parentElement.remove()">×</button>

                        </div>

                    </div>

                    <button class="add-btn no-print" onclick="addExp()">
                        + Add Experience
                    </button>

                </div>

            </div>

        </div>

    </div>

    <!-- PAGE 2 BUTTON -->

    <button class="add-page-btn no-print" id="addPageBtn" onclick="addPage2()">
        + Add Page 2
    </button>

    <!-- PAGE 2 -->

    <div class="page2" id="page2" style="display:none;">

        <button class="page2-del no-print" onclick="removePage2()">
            ✕ Remove Page 2
        </button>

        <div id="page2Sections">

            <div class="section">

                <button class="sec-del no-print"
                    onclick="this.closest('.section').remove()">×</button>

                <div class="sec-title" contenteditable="true">
                    Achievements
                </div>

                <div class="fval" contenteditable="true">
                    Write achievements here...
                </div>

            </div>

        </div>

    </div>

    <!-- SCRIPTS -->

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script>

        const token = localStorage.getItem('token');

        if (!token) {
            window.location.href = '../index.html';
        }

        let themeColor = '#e94560';
        let savedRange = null;

        // FLOAT TOOLBAR

        document.addEventListener('mouseup', () => {

            setTimeout(() => {

                const sel = window.getSelection();

                if (sel.toString().length > 0) {

                    savedRange = sel.getRangeAt(0);

                    const rect = savedRange.getBoundingClientRect();

                    const tb = document.getElementById('floatToolbar');

                    tb.style.top = (window.scrollY + rect.top - 50) + 'px';

                    tb.style.left = (window.scrollX + rect.left) + 'px';

                    tb.classList.add('show');

                }

            }, 10);

        });

        document.addEventListener('mousedown', (e) => {

            if (!e.target.closest('#floatToolbar')) {

                document.getElementById('floatToolbar').classList.remove('show');

            }

        });

        function restoreSel() {

            if (!savedRange) return;

            const sel = window.getSelection();

            sel.removeAllRanges();

            sel.addRange(savedRange);

        }

        function fmt(cmd) {

            restoreSel();

            document.execCommand(cmd, false, null);

        }

        function setColor(color) {

            restoreSel();

            document.execCommand('foreColor', false, color);

        }

        function setSize(size) {

            restoreSel();

            document.execCommand('fontSize', false, '7');

            document.querySelectorAll('font[size="7"]').forEach(el => {

                el.removeAttribute('size');

                el.style.fontSize = size;

            });

        }

        // PHOTO

        function handlePhoto(input) {

            const file = input.files[0];

            if (!file) return;

            const reader = new FileReader();

            reader.onload = (e) => {

                const img = document.getElementById('photoPreview');

                img.src = e.target.result;

                img.style.display = 'block';

                img.style.borderColor = themeColor;

                document.getElementById('photoPlaceholder').style.display = 'none';

            };

            reader.readAsDataURL(file);

        }

        // THEME

        function toggleTheme() {

            document.getElementById('themeDots').classList.toggle('show');

        }

        function changeTheme(color) {

            themeColor = color;

            document.getElementById('resumeHeader').style.background = color;

            document.querySelectorAll('.sec-title').forEach(el => {

                el.style.color = color;

                el.style.borderBottomColor = color;

            });

            document.querySelectorAll('.exp-role').forEach(el => {

                el.style.color = color;

            });

            document.querySelectorAll('.c-icon').forEach(el => {

                el.style.color = color;

            });

            const img = document.getElementById('photoPreview');

            if (img) {

                img.style.borderColor = color;

            }

        }

        // ADD FUNCTIONS

        function addContact() {

            document.getElementById('contactList').insertAdjacentHTML('beforeend', `
                <div class="contact-row">
                    <span class="c-icon" style="color:${themeColor}">📌</span>
                    <span class="c-text" contenteditable="true">New Contact</span>
                    <button class="del-btn no-print" onclick="this.parentElement.remove()">×</button>
                </div>
            `);

        }

        function addSkill() {

            document.getElementById('skillsList').insertAdjacentHTML('beforeend', `
                <div class="field">
                    <div class="fval" contenteditable="true">New Skill</div>
                    <button class="del-btn no-print" onclick="this.parentElement.remove()">×</button>
                </div>
            `);

        }

        function addExp() {

            document.getElementById('expList').insertAdjacentHTML('beforeend', `
                <div class="exp-item">

                    <div class="exp-top">

                        <div>

                            <div class="exp-co" contenteditable="true">
                                Company Name
                            </div>

                            <div class="exp-role"
                                contenteditable="true"
                                style="color:${themeColor}">
                                Your Role
                            </div>

                        </div>

                        <div class="exp-date" contenteditable="true">
                            2024 - Present
                        </div>

                    </div>

                    <div class="exp-desc" contenteditable="true">
                        Describe responsibilities here.
                    </div>

                    <button class="del-btn no-print"
                        onclick="this.parentElement.remove()">
                        ×
                    </button>

                </div>
            `);

        }

        // PAGE 2

        function addPage2() {

            document.getElementById('page2').style.display = 'block';

            document.getElementById('addPageBtn').style.display = 'none';

        }

        function removePage2() {

            document.getElementById('page2').style.display = 'none';

            document.getElementById('addPageBtn').style.display = 'inline-block';

        }

        // FIXED PDF DOWNLOAD

        async function downloadPDF() {

            const noPrintEls = document.querySelectorAll('.no-print');

            noPrintEls.forEach(el => el.style.display = 'none');

            const { jsPDF } = window.jspdf;

            const pdf = new jsPDF('p', 'mm', 'a4');

            const pages = [document.getElementById('page1')];

            const page2 = document.getElementById('page2');

            if (page2.style.display !== 'none') {

                pages.push(page2);

            }

            for (let i = 0; i < pages.length; i++) {

                const canvas = await html2canvas(pages[i], {
                    scale: 2,
                    useCORS: true
                });

                const imgData = canvas.toDataURL('image/jpeg', 1);

                if (i !== 0) pdf.addPage();

                pdf.addImage(imgData, 'JPEG', 0, 0, 210, 297);

            }

            pdf.save('resume.pdf');

            noPrintEls.forEach(el => el.style.display = '');

        }

    </script>

</body>

</html>
